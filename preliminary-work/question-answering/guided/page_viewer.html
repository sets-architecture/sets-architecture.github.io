<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Venice Page Viewer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 0.84rem; color: #222;
  height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
}

/* ── Top bar ── */
#topbar {
  display: flex; align-items: center; gap: 10px;
  padding: 7px 14px; background: #eef; border-bottom: 2px solid #99b;
  flex-shrink: 0; flex-wrap: wrap;
}
#topbar button {
  padding: 4px 12px; cursor: pointer; font-size: 0.82rem;
  border: 1px solid #99b; border-radius: 4px; background: white;
}
#topbar button:hover { background: #e0e0ff; }
#page-select {
  font-size: 0.82rem; padding: 4px 6px;
  min-width: 220px; max-width: 280px;
  border: 1px solid #99b; border-radius: 4px;
}
#page-counter { font-size: 0.78rem; color: #667; white-space: nowrap; }
.sep { color: #aab; }
#toggles-label { font-size: 0.78rem; color: #556; white-space: nowrap; }
.toggle-wrap { display: flex; gap: 6px; flex-wrap: wrap; }
.toggle-lbl {
  display: flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 4px;
  border: 2px solid #ccc; background: white;
  cursor: pointer; user-select: none; font-size: 0.8rem;
  transition: opacity 0.15s;
}
.toggle-lbl.off { opacity: 0.45; background: #f5f5f5; }
.toggle-lbl input { cursor: pointer; accent-color: var(--mc); }
.toggle-name { font-weight: 600; }

/* ── Main split ── */
#main { display: flex; flex: 1; overflow: hidden; }

/* ── Image panel ── */
#img-panel {
  width: 42%; min-width: 260px; max-width: 580px;
  border-right: 2px solid #ccc;
  display: flex; flex-direction: column; overflow: hidden;
  resize: horizontal;
}
#img-hdr {
  padding: 6px 10px; background: #f5f5f5;
  border-bottom: 1px solid #ddd;
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0; gap: 8px;
}
#img-title { font-weight: bold; font-size: 0.88rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#img-link {
  font-size: 0.78rem; color: #1565c0; text-decoration: none;
  white-space: nowrap; flex-shrink: 0;
}
#img-link:hover { text-decoration: underline; }
#img-container {
  flex: 1; overflow: auto; background: #888;
  display: flex; align-items: flex-start; justify-content: center; padding: 6px;
}
#page-img { max-width: 100%; height: auto; display: block; box-shadow: 0 2px 8px #0006; }
#no-img {
  padding: 40px 20px; text-align: center; color: #555;
  background: #e8e8e8; border-radius: 6px; margin: auto; line-height: 1.6;
}
#no-img a { color: #1565c0; font-weight: bold; }

/* ── Table panel ── */
#table-panel { flex: 1; overflow: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }

thead th {
  position: sticky; top: 0; z-index: 2;
  border: 1px solid #bbb; padding: 5px 8px;
  text-align: center; white-space: nowrap;
  background: #e0e0e0;
}
thead th.gt-hdr { background: #fffde7; }
thead th.best-sub  { background: #c8e6c9; font-size: 0.76rem; font-weight: normal; }
thead th.worst-sub { background: #ffcdd2; font-size: 0.76rem; font-weight: normal; }

td { border: 1px solid #e0e0e0; padding: 4px 8px; vertical-align: middle; }
td.qnum { text-align: center; font-weight: bold; color: #666; background: #fafafa; white-space: nowrap; width: 36px; }
td.qtxt { color: #444; max-width: 200px; font-size: 0.80rem; }
td.gt   { font-family: monospace; font-weight: 600; background: #fffde7; white-space: nowrap; }
td.ans  { font-family: monospace; font-size: 0.79rem; white-space: nowrap; min-width: 72px; }
td.ans.same  { color: #888; }
td.nodata    { text-align: center; color: #ccc; font-style: italic; }
tr:hover td  { filter: brightness(0.97); }

/* ── Model column visibility ── */
.hide-0 .mc-0 { display: none; }
.hide-1 .mc-1 { display: none; }
.hide-2 .mc-2 { display: none; }
.hide-3 .mc-3 { display: none; }
.dates { font-size: 0.8rem; color: #666; margin: 0.25rem 0 1.25rem; line-height: 1.45; }</style>
</head>

, "same": true}, "Gemini 3.1": {"best": {"answer": "Y", "score": 1.0, "cond": false}, "worst": {"answer": "Y", "score": 1.0, "cond": false}, "same": true}, "Claude (thinking)": {"best": {"answer": "Y", "score": 1.0, "cond": false}, "worst": {"answer": "Y", "score": 1.0, "cond": false}, "same": true}}}]}];
const MODEL_LABELS = ["Claude", "GPT", "Gemini 2.5", "Gemini 3.1", "Claude (thinking)"];
const MODEL_COLORS = {
  "Claude":     "#4e79a7",
  "GPT":        "#f28e2b",
  "Gemini 2.5": "#59a14f",
  "Gemini 3.1": "#b07aa1",
};

let currentIdx = 0;
const visible  = MODEL_LABELS.map(() => true);

/* ── Toggles ── */
function buildToggles() {
  const wrap = document.getElementById('toggles');
  MODEL_LABELS.forEach((label, i) => {
    const color = MODEL_COLORS[label] || '#999';
    const lbl   = document.createElement('label');
    lbl.className     = 'toggle-lbl';
    lbl.style.cssText = `--mc:${color}; border-color:${color}`;
    lbl.innerHTML     =
      `<input type="checkbox" checked data-i="${i}">` +
      `<span class="toggle-name" style="color:${color}">${label}</span>`;
    lbl.querySelector('input').addEventListener('change', e => {
      const idx   = parseInt(e.target.dataset.i);
      visible[idx] = e.target.checked;
      lbl.classList.toggle('off', !visible[idx]);
      updateVisibility();
    });
    wrap.appendChild(lbl);
  });
}

function updateVisibility() {
  const panel = document.getElementById('table-panel');
  MODEL_LABELS.forEach((_, i) => {
    panel.classList.toggle(`hide-${i}`, !visible[i]);
  });
}

/* ── Table header ── */
function buildHeader() {
  const head = document.getElementById('tbl-head');
  let r1 = '<tr>' +
    '<th rowspan="2" style="width:36px">Q#</th>' +
    '<th rowspan="2">Question</th>' +
    '<th rowspan="2" class="gt-hdr">GT</th>';
  let r2 = '<tr>';
  MODEL_LABELS.forEach((label, i) => {
    const color = MODEL_COLORS[label] || '#999';
    r1 += `<th colspan="2" class="mc-${i}" ` +
          `style="background:${color}22; border-left:3px solid ${color}">${label}</th>`;
    r2 += `<th class="mc-${i} best-sub"  style="border-left:3px solid ${color}">best</th>`;
    r2 += `<th class="mc-${i} worst-sub">worst</th>`;
  });
  head.innerHTML = r1 + '</tr>' + r2 + '</tr>';
}

/* ── Score colour ── */
function scoreColor(score, cond) {
  if (cond)         return '#f5f5f5';
  if (score >= 0.9) return '#e8f5e9';
  if (score >= 0.5) return '#fff9c4';
  return '#ffebee';
}

/* ── Render page ── */
function renderPage(idx) {
  currentIdx = idx;
  const page = PAGES[idx];

  document.getElementById('page-select').value        = idx;
  document.getElementById('page-counter').textContent = `(${idx + 1} / ${PAGES.length})`;
  document.getElementById('img-title').textContent    = page.date_text || ('Page ' + page.page_id);
  document.getElementById('img-link').href            = page.gcs_url;
  document.getElementById('no-img-link').href         = page.gcs_url;

  const img   = document.getElementById('page-img');
  const noImg = document.getElementById('no-img');
  if (page.local_img) {
    img.src          = page.local_img;
    img.style.display = '';
    noImg.style.display = 'none';
  } else {
    img.style.display   = 'none';
    noImg.style.display = '';
  }

  let html = '';
  for (const q of page.questions) {
    html += `<tr><td class="qnum">Q${q.qid}</td><td class="qtxt">${q.text}</td><td class="gt">${q.gt}</td>`;
    MODEL_LABELS.forEach((label, i) => {
      const color = MODEL_COLORS[label] || '#999';
      const md    = q.models[label];
      const bl    = `border-left:2px solid ${color}`;
      if (!md) {
        html += `<td class="mc-${i} nodata" style="${bl}">—</td>`;
        html += `<td class="mc-${i} nodata">—</td>`;
      } else {
        const bk = scoreColor(md.best.score,  md.best.cond);
        const wk = scoreColor(md.worst.score, md.worst.cond);
        const sc = md.same ? ' same' : '';
        html += `<td class="mc-${i} ans${sc}" style="background:${bk};${bl}">${md.best.answer}</td>`;
        html += `<td class="mc-${i} ans${sc}" style="background:${wk}">${md.worst.answer}</td>`;
      }
    });
    html += '</tr>';
  }
  document.getElementById('tbl-body').innerHTML = html;
}

/* ── Navigation ── */
document.getElementById('btn-prev').addEventListener('click', () => {
  if (currentIdx > 0) renderPage(currentIdx - 1);
});
document.getElementById('btn-next').addEventListener('click', () => {
  if (currentIdx < PAGES.length - 1) renderPage(currentIdx + 1);
});
document.getElementById('page-select').addEventListener('change', e => {
  renderPage(parseInt(e.target.value));
});
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft'  && !e.target.matches('select,input')) document.getElementById('btn-prev').click();
  if (e.key === 'ArrowRight' && !e.target.matches('select,input')) document.getElementById('btn-next').click();
});

/* ── Init ── */
buildToggles();
buildHeader();
updateVisibility();
renderPage(0);
</script>

    keys.forEach(k => {
      const run = DATA.runs[k];
      const label = labelFor(k) + ' <span class="f1">(run ' + run.run + ', F1=' + run.f1.toFixed(2) + ')</span>';
      headerRow += '<th>' + label + '</th>';
    });
    headerRow += '</tr>';
    tbl.innerHTML = headerRow;

    // GT rows
    DATA.gt.forEach((gtRow, idx) => {
      let tr = '<tr><td class="idx">' + (idx+1) + '</td>';
      const gtVal = gtRow[fkey] || '';
      tr += '<td class="gt">' + escapeHtml(gtVal) + '</td>';
      keys.forEach(k => {
        const run = DATA.runs[k];
        const match = run.gt_to_match[idx];
        if(!match){
          tr += '<td class="miss">—</td>';
        } else {
          const v = match.row[fkey];
          const value = (v===null || v===undefined) ? '' : String(v);
          let cls = 'neutral';
          let scoreSuffix = '';
          if(fkey === 'name'){
            cls = (match.score === 1.0) ? 'ok' : (match.score >= 0.85 ? 'partial' : 'neutral');
            if(match.score < 1.0) scoreSuffix = ' <span class="score">' + match.score.toFixed(2) + '</span>';
          } else {
            const m = match.fields[fkey];
            if(m === null || m === undefined){
              cls = 'neutral';
            } else if(m >= 0.999){
              cls = 'ok';
            } else if(m >= 0.7){
              cls = 'partial';
              scoreSuffix = ' <span class="score">' + m.toFixed(2) + '</span>';
            } else {
              cls = 'bad';
              if(m > 0) scoreSuffix = ' <span class="score">' + m.toFixed(2) + '</span>';
            }
          }
          tr += '<td class="' + cls + '">' + escapeHtml(value) + scoreSuffix + '</td>';
        }
      });
      tr += '</tr>';
      tbl.innerHTML += tr;
    });

    // Extra rows (unmatched model output) — only show if any selected key has any
    const anyExtras = keys.some(k => DATA.runs[k].unmatched.length > 0);
    if(anyExtras){
      tbl.innerHTML += '<tr class="extra-divider"><td colspan="' + (2+keys.length) + '">Unmatched model rows (no GT pair)</td></tr>';
      const maxExtras = Math.max(...keys.map(k => DATA.runs[k].unmatched.length));
      for(let i = 0; i < maxExtras; i++){
        let tr = '<tr><td class="idx">+' + (i+1) + '</td><td class="gt">—</td>';
        keys.forEach(k => {
          const extras = DATA.runs[k].unmatched;
          if(i < extras.length){
            const v = extras[i][fkey];
            tr += '<td class="extra">' + escapeHtml(v===null||v===undefined?'':String(v)) + '</td>';
          } else {
            tr += '<td class="miss">—</td>';
          }
        });
        tr += '</tr>';
        tbl.innerHTML += tr;
      }
    }
    wrap.appendChild(tbl);
    tablesEl.appendChild(wrap);
  });

  if(keys.length === 0){
    const div = document.createElement('div');
    div.className = 'empty';
    div.textContent = 'Select one or more model + phase columns above to compare against ground truth.';
    tablesEl.insertBefore(div, tablesEl.firstChild);
  }
}

function labelFor(key){
  // key looks like "claude_thinking_a"
  const [phaseKey] = [key.slice(key.lastIndexOf('_')+1)];
  const modelKey = key.slice(0, key.lastIndexOf('_'));
  const m = MODELS.find(x => x[0] === modelKey);
  const p = PHASES.find(x => x[0] === phaseKey);
  return (m ? m[1] : modelKey) + ' ' + (p ? p[1] : phaseKey);
}

document.addEventListener('change', e => {
  if(e.target.matches('.controls input')) render();
});

document.getElementById('select-all').addEventListener('click', () => {
  document.querySelectorAll('.controls input[type=checkbox]:not([disabled])').forEach(el => { el.checked = true; });
  render();
});
document.getElementById('clear-all').addEventListener('click', () => {
  document.querySelectorAll('.controls input[type=checkbox]').forEach(el => { el.checked = false; });
  render();
});
document.getElementById('phase-b-only').addEventListener('click', () => {
  document.querySelectorAll('.controls input[type=checkbox]').forEach(el => {
    el.checked = !el.disabled && el.dataset.key.endsWith('_b');
  });
  render();
});

render();
</script>
</body>
</html>
